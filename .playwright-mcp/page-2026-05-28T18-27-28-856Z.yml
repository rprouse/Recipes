            - generic [ref=e142]:
              - generic [ref=e143]:
                - heading "Preparation" [level=2] [ref=e144]
                - list [ref=e145]:
                  - listitem [ref=e146]:
                    - generic [ref=e147]: Step 1
                    - paragraph [ref=e149]: Bring a large pot of salted water to a boil. Meanwhile, zest and juice the lemon into a high-powered blender or food processor. Add the cottage cheese, Parmesan, oil, garlic, spinach and basil. Blend until very smooth. (in a food processor, this can take up to five minutes.)
                  - listitem [ref=e150]:
                    - heading [level=3]
                    - list [ref=e151]:
                      - listitem [ref=e152]:
                        - generic [ref=e153]: Step 2
                        - paragraph [ref=e155]: Add the pasta to the boiling water and cook until al dente according to package directions. Scoop out 1 ½ cups of the pasta water, then drain the pasta and return to the pot. With the blender running, pour ¾ cup of the pasta water into the cottage cheese mixture and blend until smooth.
                  - listitem [ref=e156]:
                    - heading [level=3]
                    - list [ref=e157]:
                      - listitem [ref=e158]:
                        - generic [ref=e159]: Step 3
                        - paragraph [ref=e161]: Off the heat, add the cottage cheese mixture to the pasta. Toss vigorously until the pasta is coated in sauce, adding more pasta water as needed until glossy. Season to taste with salt. Serve topped with a drizzle of olive oil and more Parmesan.
              - generic [ref=e162]:
                - text: Tip
                - list [ref=e163]:
                  - listitem [ref=e164]:
                    - paragraph [ref=e165]: "Since you’re getting a blender or food processor dirty anyway, use it to grate the Parmesan, too: Chop the Parmesan into big chunks, then pulse in a blender until ground. Take some out for serving, then add the rest of the sauce ingredients and proceed."
