                - listitem [ref=e130]:
                  - paragraph [ref=e131]: 3 ounces baby spinach (3 big handfuls)
                - listitem [ref=e132]:
                  - paragraph [ref=e133]: 2½ ounces torn basil leaves (2 packed cups)
                - listitem [ref=e134]:
                  - paragraph [ref=e135]: 1 pound spaghetti or other long pasta
              - generic [ref=e136]:
