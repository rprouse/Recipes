              - text: . Instead of heavy cream, however, this pasta’s silkiness comes from blending cottage cheese with plenty of Parmesan. You’ll want to use a high-speed blender or food processor to whirl the cheeses and greens into a smooth and glossy sauce, and if you have a scale, use it to make quick work of measuring the sauce’s ingredients.
