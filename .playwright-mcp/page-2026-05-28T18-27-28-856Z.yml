                  - paragraph [ref=e119]: Salt
                - listitem [ref=e120]:
                  - paragraph [ref=e121]: 1 lemon
                - listitem [ref=e122]:
                  - paragraph [ref=e123]: 8 ounces whole-milk cottage cheese (1 cup), at room temperature
                - listitem [ref=e124]:
                  - paragraph [ref=e125]: 3½ ounces grated Parmesan (1 cup), plus more for serving (see Tip)
                - listitem [ref=e126]:
                  - paragraph [ref=e127]: 2 tablespoons extra-virgin olive oil, plus more for serving
                - listitem [ref=e128]:
