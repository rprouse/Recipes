            - paragraph [ref=e91]: This quick stir-fry combines ground beef with crumbled tofu for a meal that feels lighter but still tastes rich, thanks to deeply savory oyster sauce spiked with garlic and ginger. High-heat cooking helps develop flavor by caramelizing tofu in the beef drippings and grassy asparagus adds crisp fresh bites. Turn leftovers into a fast meal by tossing with cooked noodles (like soba or udon) and chopped cucumbers for crunch.
