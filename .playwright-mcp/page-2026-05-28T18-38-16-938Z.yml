              - generic [ref=e124]:
                - generic [ref=e125]: "Yield:"
                - generic [ref=e126]: 4 servings
              - list [ref=e127]:
                - listitem [ref=e128]:
                  - paragraph [ref=e129]: 2 tablespoons oyster sauce
                - listitem [ref=e130]:
                  - paragraph [ref=e131]: 2 tablespoons low-sodium chicken broth
                - listitem [ref=e132]:
                  - paragraph [ref=e133]: 1 tablespoon low-sodium soy sauce
                - listitem [ref=e134]:
                  - paragraph [ref=e135]: 1 teaspoon distilled white vinegar
                - listitem [ref=e136]:
                  - paragraph [ref=e137]: 1 teaspoon turbinado or granulated sugar
                - listitem [ref=e138]:
                  - paragraph [ref=e139]: ¼ teaspoon toasted sesame oil
                - listitem [ref=e140]:
                  - paragraph [ref=e141]: 1 teaspoon cornstarch
                - listitem [ref=e142]:
                  - paragraph [ref=e143]: 2 tablespoons safflower, sunflower or other neutral oil
                - listitem [ref=e144]:
                  - paragraph [ref=e145]: 8 ounces ground beef (80 percent lean)
                - listitem [ref=e146]:
                  - paragraph [ref=e147]: 4 scallions, thinly sliced (½ cup), plus more for garnish
                - listitem [ref=e148]:
                  - paragraph [ref=e149]: Salt and pepper
                - listitem [ref=e150]:
                  - paragraph [ref=e151]: 8 ounces firm tofu, crumbled and patted dry with paper towels (1½ cups)
                - listitem [ref=e152]:
                  - paragraph [ref=e153]: 12 ounces asparagus, trimmed and sliced into ½-inch pieces
                - listitem [ref=e154]:
                  - paragraph [ref=e155]: 3 garlic cloves, minced
                - listitem [ref=e156]:
                  - paragraph [ref=e157]: 1 tablespoon minced peeled ginger
                - listitem [ref=e158]:
                  - paragraph [ref=e159]: Warm rice and hot sauce (optional), for serving
              - generic [ref=e160]:
                - button "Add ingredients to Grocery List" [ref=e162] [cursor=pointer]:
                  - generic [ref=e163]: Add ingredients to Grocery List
                - link "Ingredient Substitution Guide" [ref=e164] [cursor=pointer]:
                  - /url: /article/ingredient-substitutions
            - generic [ref=e167]:
              - heading "Preparation" [level=2] [ref=e168]
              - list [ref=e169]:
                - listitem [ref=e170]:
                  - generic [ref=e171]: Step 1
                  - paragraph [ref=e173]: In a small bowl, combine oyster sauce, broth, soy sauce, vinegar, sugar and sesame oil. Add cornstarch and whisk until smooth.
                - listitem [ref=e174]:
                  - generic [ref=e175]: Step 2
                  - paragraph [ref=e177]: In a 12-inch nonstick skillet, heat 1 tablespoon of the neutral oil over medium-high. Add beef and ¼ cup of the scallions, season with salt and pepper and cook, stirring and breaking up the meat, until browned, about 3 minutes. Using a slotted spoon, transfer beef mixture to a plate, leaving any oil behind.
                - listitem [ref=e178]:
                  - generic [ref=e179]: Step 3
                  - paragraph [ref=e181]: Add the remaining 1 tablespoon neutral oil and tofu to the skillet, season with salt and pepper and cook, stirring occasionally, until tofu is dry and golden, about 5 minutes. Add asparagus, garlic and ginger and cook, stirring occasionally, until asparagus is crisp-tender, about 2 minutes. Add beef (and any accumulated juices) and oyster sauce mixture and stir until sauce is absorbed, about 1 minute. Stir in the remaining ¼ cup scallions.
                - listitem [ref=e182]:
                  - generic [ref=e183]: Step 4
                  - paragraph [ref=e185]: Transfer to a serving dish and garnish with scallions. Serve warm with rice and hot sauce on the side, if using.
                - listitem [ref=e186]:
                  - heading [level=3]
                  - list
